name: Atlas Tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  atlas-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package:
          - atlas-events
          - atlas-metrics
          - atlas-memory

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest